// ============== APP ==============
function PetionalChip() {
  const [tab, setTab] = useState("home");
  const [scenario, setScenario] = useState("feliz");
  const [showSim, setShowSim] = useState(true);
  const [now, setNow] = useState(new Date());

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const state = SCENARIOS[scenario];
  const emotion = EMOTIONS[state.emotion];

  const screens = {
    home: <HomeScreen state={state} emotion={emotion} />,
    history: <HistoryScreen />,
    health: <HealthScreen state={state} />,
    alerts: <AlertsScreen state={state} />,
    settings: <SettingsScreen setTab={setTab} />,
    profile: <ProfileScreen />,
    prediction: <PredictionScreen />,
    gps: <GpsScreen />,
    feedback: <FeedbackScreen />,
  };

  return (
    <div style={{ minHeight: "100vh", padding: "24px 12px", display: "flex", justifyContent: "center" }}>
      <div style={{ maxWidth: 420, width: "100%" }}>
        <div style={{ background: "#1a1a1a", borderRadius: 48, padding: 12, boxShadow: "0 25px 60px rgba(0,0,0,.25), 0 0 0 2px #2a2a2a inset" }}>
          <div style={{ background: "#F5F5F7", borderRadius: 38, overflow: "hidden", height: 780, display: "flex", flexDirection: "column", position: "relative" }}>
            <StatusBar now={now} />
            <AppHeader tab={tab} setTab={setTab} />
            <div key={tab} className="screen-anim" style={{ flex: 1, overflowY: "auto", paddingBottom: 80 }}>
              {screens[tab]}
            </div>
            <BottomNav tab={tab} setTab={setTab} />
          </div>
        </div>
        <SimPanel scenario={scenario} setScenario={setScenario} showSim={showSim} setShowSim={setShowSim} />
      </div>
    </div>
  );
}

  );
}

const Card = ({ children, style }) => (

const SectionTitle = ({ icon: Icon, label }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>

  </div>

function relTime(daysAgo) {
  if (daysAgo == null) return "ahora";
  if (daysAgo < 1) return "hoy";
  if (daysAgo === 1) return "hace 1 día";
  if (daysAgo < 30) return "hace " + daysAgo + " días";
  const m = Math.floor(daysAgo / 30);
  return "hace " + m + (m === 1 ? " mes" : " meses");
}

function relTimeFromDate(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "ahora";
  if (mins < 60) return "hace " + mins + " min";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return "hace " + hrs + " h";
  const days = Math.floor(hrs / 24);
  return relTime(days);
}

// ============== GPS ==============
function GpsScreen() {
  const [pos, setPos] = useState(0);
  const [live, setLive] = useState(false);
  useEffect(() => {
    if (!live) return;
    const t = setInterval(() => setPos(p => (p + 1) % 100), 100);
    return () => clearInterval(t);
  }, [live]);

  const route = [[40, 220], [80, 200], [120, 180], [160, 150], [200, 140], [230, 120], [255, 100], [280, 90], [300, 80]];
  const t = pos / 100 * (route.length - 1);
  const i = Math.floor(t), f = t - i;
  const a = route[i], b = route[Math.min(i + 1, route.length - 1)];
  const cx = a[0] + (b[0] - a[0]) * f;
  const cy = a[1] + (b[1] - a[1]) * f;

  return (
    <div style={{ padding: "8px 20px 20px", display: "flex", flexDirection: "column", gap: 14 }}>
      <Card style={{ padding: 0, overflow: "hidden" }}>
        <div style={{ position: "relative", height: 260, background: "linear-gradient(135deg,#E8F5E9 0%,#C8E6C9 100%)" }}>
          <svg width="100%" height="100%" viewBox="0 0 340 260" style={{ position: "absolute", inset: 0 }}>
            <line x1="0" y1="80" x2="340" y2="80" stroke="#fff" strokeWidth="14" opacity=".7" />
            <line x1="0" y1="180" x2="340" y2="180" stroke="#fff" strokeWidth="10" opacity=".6" />
            <line x1="100" y1="0" x2="100" y2="260" stroke="#fff" strokeWidth="10" opacity=".6" />
            <line x1="230" y1="0" x2="230" y2="260" stroke="#fff" strokeWidth="14" opacity=".7" />
            <rect x="20" y="200" width="60" height="40" rx="6" fill="#A5D6A7" />
            <rect x="260" y="20" width="60" height="50" rx="6" fill="#A5D6A7" />
            <polyline points={route.map(p => p.join(",")).join(" ")} fill="none" stroke="#4CAF50" strokeWidth="4" strokeLinecap="round" strokeDasharray="6 4" />
            <circle cx={route[0][0]} cy={route[0][1]} r="6" fill="#42A5F5" stroke="white" strokeWidth="2" />
            <circle cx={route[route.length-1][0]} cy={route[route.length-1][1]} r="6" fill="#EF5350" stroke="white" strokeWidth="2" />
            <circle cx={cx} cy={cy} r="14" fill="#4CAF50" opacity=".25">
              {live && <animate attributeName="r" values="10;20;10" dur="1.5s" repeatCount="indefinite" />}
            </circle>
            <circle cx={cx} cy={cy} r="8" fill="#4CAF50" stroke="white" strokeWidth="3" />
          </svg>
        </div>
        <div style={{ padding: 14, display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <MapPin size={18} color="#4CAF50" />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#1C1C1E" }}>Av. Libertad 1234, Viña del Mar</div>
              <div style={{ fontSize: 11, color: "#8E8E93" }}>{live ? "Seguimiento en vivo" : "Última ubicación · hace 2 min"}</div>
            </div>
          </div>
          <button onClick={() => setLive(!live)} style={{ background: live ? "#EF5350" : "#4CAF50", color: "white", border: "none", padding: "12px 16px", borderRadius: 14, fontWeight: 600, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
            {live ? <><Pause size={16} color="white" /> Detener seguimiento</> : <><Play size={16} color="white" /> Ver ubicación en tiempo real</>}
          </button>
        </div>
      </Card>

      <Card>
        <SectionTitle icon={MapPin} label="Resumen del día" />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <Stat label="Distancia" value="1.8" unit="km" />
          <Stat label="Paseos" value="2" unit="hoy" />
          <Stat label="Tiempo fuera" value="48" unit="min" />
          <Stat label="Zona segura" value="✓" unit="dentro" />
        </div>
      </Card>
    </div>
  );
}

const Stat = ({ label, value, unit }) => (
  <div style={{ background: "#F5F5F7", borderRadius: 12, padding: 10 }}>
    <div style={{ fontSize: 10, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: .3 }}>{label}</div>
    <div style={{ fontSize: 18, fontWeight: 700, color: "#1C1C1E" }}>
      {value}<span style={{ fontSize: 11, color: "#8E8E93", marginLeft: 3 }}>{unit}</span>
    </div>
  </div>
);

// ============== FEEDBACK / OPINIONES ==============
function FeedbackScreen() {
  // Cargar opiniones del usuario desde localStorage
  const [userReviews, setUserReviews] = useState(() => {
    try {
      const raw = localStorage.getItem("petionalchip-reviews");
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  });

  const [filter, setFilter] = useState("all");
  const [formOpen, setFormOpen] = useState(false);
  const [thanks, setThanks] = useState(false);

  // Form state
  const [rating, setRating] = useState(0);
  const [hover, setHover] = useState(0);
  const [category, setCategory] = useState("sugerencia");
  const [text, setText] = useState("");
  const [name, setName] = useState("");

  // Convertir todas las reseñas a formato uniforme con fecha relativa
  const allReviews = [
    ...userReviews.map(r => ({ ...r, isUser: true })),
    ...SEED_REVIEWS,
  ];

  const filtered = filter === "all" ? allReviews : allReviews.filter(r => r.category === filter);

  // Stats
  const avg = allReviews.reduce((a, b) => a + b.rating, 0) / allReviews.length;
  const dist = [5, 4, 3, 2, 1].map(n => ({
    stars: n,
    count: allReviews.filter(r => r.rating === n).length,
  }));
  const maxCount = Math.max(...dist.map(d => d.count), 1);

  const resetForm = () => {
    setRating(0); setHover(0); setCategory("sugerencia"); setText(""); setName("");
  };

  const submit = () => {
    if (!rating || !text.trim()) return;
    const newRev = {
      id: "u" + Date.now(),
      rating,
      category,
      text: text.trim(),
      name: name.trim() || "Anónimo",
      createdAt: new Date().toISOString(),
    };
    const updated = [newRev, ...userReviews];
    setUserReviews(updated);
    try { localStorage.setItem("petionalchip-reviews", JSON.stringify(updated)); } catch {}
    resetForm();
    setFormOpen(false);
    setThanks(true);
    setTimeout(() => setThanks(false), 2800);
  };

  const canSubmit = rating > 0 && text.trim().length >= 4;

  return (
    <div style={{ padding: "8px 20px 20px", display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Thanks toast */}
      {thanks && (
        <div className="pop-in" style={{ background: "#4CAF50", color: "white", padding: "12px 14px", borderRadius: 14, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 6px 20px rgba(76,175,80,.35)" }}>
          <CheckCircle2 size={20} color="white" />
          <div style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>¡Gracias por tu opinión!</div>
        </div>
      )}

      {/* Resumen */}
      <Card style={{ background: "linear-gradient(135deg,#FFF8E1 0%,#ffffff 100%)" }}>
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <div style={{ textAlign: "center", minWidth: 80 }}>
            <div style={{ fontSize: 38, fontWeight: 800, color: "#1C1C1E", lineHeight: 1 }}>{avg.toFixed(1)}</div>
            <div style={{ display: "flex", gap: 2, justifyContent: "center", marginTop: 4 }}>
              {[1,2,3,4,5].map(n =>
                <Star key={n} size={13} color="#FFB300" filled={n <= Math.round(avg)} />
              )}
            </div>
            <div style={{ fontSize: 10, color: "#8E8E93", marginTop: 4, fontWeight: 600 }}>{allReviews.length} opiniones</div>
          </div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4 }}>
            {dist.map(d => (
              <div key={d.stars} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 10, color: "#8E8E93", fontWeight: 600, width: 14 }}>{d.stars}★</span>
                <div style={{ flex: 1, height: 6, background: "#F0E5C8", borderRadius: 999, overflow: "hidden" }}>
                  <div style={{ width: (d.count / maxCount * 100) + "%", height: "100%", background: "#FFB300", borderRadius: 999, transition: "width .5s ease" }} />
                </div>
                <span style={{ fontSize: 10, color: "#8E8E93", fontWeight: 600, width: 14, textAlign: "right" }}>{d.count}</span>
              </div>
            ))}
          </div>
        </div>
      </Card>

      {/* Botón nueva opinión */}
      {!formOpen && (
        <button onClick={() => setFormOpen(true)} style={{
          background: "linear-gradient(135deg,#4CAF50 0%,#2E7D32 100%)", color: "white", border: "none",
          padding: "14px 16px", borderRadius: 16, fontWeight: 700, fontSize: 14, cursor: "pointer",
          display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
          boxShadow: "0 6px 18px rgba(76,175,80,.3)"
        }}>
          <MessageSquare size={16} color="white" />
          Dejar mi opinión
        </button>
      )}

      {/* Formulario */}
      {formOpen && (
        <Card style={{ border: "2px solid #4CAF50" }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#1C1C1E", marginBottom: 12 }}>Comparte tu experiencia</div>

          {/* Estrellas */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: .3, marginBottom: 6 }}>Tu calificación</div>
            <div style={{ display: "flex", gap: 6, justifyContent: "center", padding: "6px 0" }}>
              {[1,2,3,4,5].map(n => (
                <button
                  key={n}
                  onClick={() => setRating(n)}
                  onMouseEnter={() => setHover(n)}
                  onMouseLeave={() => setHover(0)}
                  style={{ background: "none", border: "none", cursor: "pointer", padding: 4, transition: "transform .15s", transform: (hover === n) ? "scale(1.15)" : "scale(1)" }}
                >
                  <Star size={32} color="#FFB300" filled={n <= (hover || rating)} strokeWidth={1.8} />
                </button>
              ))}
            </div>
            {rating > 0 && (
              <div style={{ textAlign: "center", fontSize: 11, color: "#8E8E93", marginTop: 2 }}>
                {["", "Muy mala", "Mala", "Regular", "Buena", "Excelente"][rating]}
              </div>
            )}
          </div>

          {/* Categoría */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: .3, marginBottom: 6 }}>Tipo</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 6 }}>
              {Object.entries(CATEGORIES).map(([key, c]) => {
                const active = category === key;
                return (
                  <button key={key} onClick={() => setCategory(key)} style={{
                    background: active ? c.color : "#F5F5F7",
                    color: active ? "white" : "#1C1C1E",
                    border: "none", borderRadius: 10, padding: "8px 4px", cursor: "pointer",
                    display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                    transition: "all .2s"
                  }}>
                    <c.icon size={14} color={active ? "white" : c.color} />
                    <span style={{ fontSize: 11, fontWeight: 600 }}>{c.label}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Texto */}
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: .3, marginBottom: 6 }}>Tu opinión</div>
            <textarea
              value={text}
              onChange={e => setText(e.target.value)}
              placeholder="Cuéntanos qué piensas, qué te gustaría mejorar o qué te encantó…"
              rows={4}
              maxLength={400}
              style={{
                width: "100%", padding: "10px 12px", borderRadius: 12, border: "1px solid #e5e5ea",
                fontSize: 13, color: "#1C1C1E", resize: "none", outline: "none", background: "#F5F5F7"
              }}
            />
            <div style={{ fontSize: 10, color: "#8E8E93", textAlign: "right", marginTop: 2 }}>{text.length}/400</div>
          </div>

          {/* Nombre */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: .3, marginBottom: 6 }}>Tu nombre (opcional)</div>
            <input
              type="text"
              value={name}
              onChange={e => setName(e.target.value)}
              placeholder="Ej: Santiago R."
              maxLength={40}
              style={{
                width: "100%", padding: "10px 12px", borderRadius: 12, border: "1px solid #e5e5ea",
                fontSize: 13, color: "#1C1C1E", outline: "none", background: "#F5F5F7"
              }}
            />
          </div>

          {/* Acciones */}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { resetForm(); setFormOpen(false); }} style={{
              flex: 1, background: "#F5F5F7", color: "#1C1C1E", border: "none",
              padding: "12px", borderRadius: 12, fontWeight: 600, fontSize: 13, cursor: "pointer"
            }}>Cancelar</button>
            <button onClick={submit} disabled={!canSubmit} style={{
              flex: 2, background: canSubmit ? "#4CAF50" : "#C8E6C9",
              color: "white", border: "none", padding: "12px", borderRadius: 12,
              fontWeight: 700, fontSize: 13, cursor: canSubmit ? "pointer" : "not-allowed",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 6
            }}>
              <Send size={14} color="white" />
              Enviar opinión
            </button>
          </div>
        </Card>
      )}

      {/* Filtros */}
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 4 }}>
        {[
          { id: "all", label: "Todas" },
          { id: "elogio", label: "Elogios" },
          { id: "sugerencia", label: "Sugerencias" },
          { id: "problema", label: "Problemas" },
        ].map(f => {
          const active = filter === f.id;
          return (
            <button key={f.id} onClick={() => setFilter(f.id)} style={{
              background: active ? "#1C1C1E" : "white",
              color: active ? "white" : "#1C1C1E",
              border: "1px solid " + (active ? "#1C1C1E" : "#e5e5ea"),
              padding: "6px 12px", borderRadius: 999, fontSize: 12, fontWeight: 600,
              cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0
            }}>{f.label}</button>
          );
        })}
      </div>

      {/* Lista de opiniones */}
      {filtered.length === 0 ? (
        <Card>
          <div style={{ textAlign: "center", padding: 16, color: "#8E8E93", fontSize: 13 }}>
            No hay opiniones en esta categoría todavía.
          </div>
        </Card>
      ) : (
        filtered.map(r => <ReviewCard key={r.id} review={r} />)
      )}

      <div style={{ marginTop: 4, fontSize: 11, color: "#8E8E93", textAlign: "center", lineHeight: 1.5 }}>
        Tus opiniones quedan guardadas en este dispositivo.<br/>
        Gracias por ayudarnos a mejorar PetionalChip 🐾
      </div>
    </div>
  );
}

function ReviewCard({ review }) {
  const cat = CATEGORIES[review.category];
  const initial = (review.name || "?").charAt(0).toUpperCase();
  const when = review.isUser ? relTimeFromDate(review.createdAt) : relTime(review.daysAgo);
  return (
    <Card>
      <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
        <div style={{
          width: 36, height: 36, borderRadius: 999, flexShrink: 0,
          background: "linear-gradient(135deg," + cat.color + "," + cat.color + "cc)",
          color: "white", display: "flex", alignItems: "center", justifyContent: "center",
          fontWeight: 700, fontSize: 14
        }}>{initial}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#1C1C1E" }}>{review.name}</div>
            <div style={{ fontSize: 10, color: "#8E8E93", fontWeight: 500 }}>{when}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 3 }}>
            <div style={{ display: "flex", gap: 1 }}>
              {[1,2,3,4,5].map(n =>
                <Star key={n} size={11} color="#FFB300" filled={n <= review.rating} />
              )}
            </div>
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 3,
              background: cat.color + "22", color: cat.color,
              padding: "2px 7px", borderRadius: 999, fontSize: 10, fontWeight: 700
            }}>
              <cat.icon size={10} color={cat.color} />
              {cat.label}
            </div>
            {review.isUser && (
              <div style={{ background: "#E8F5E9", color: "#2E7D32", padding: "2px 6px", borderRadius: 999, fontSize: 9, fontWeight: 700 }}>Tú</div>
            )}
          </div>
          <div style={{ fontSize: 12.5, color: "#1C1C1E", lineHeight: 1.5, marginTop: 7 }}>
            {review.text}
          </div>
        </div>
      </div>
    </Card>
  );
}

// ============== SIM PANEL ==============
function SimPanel({ scenario, setScenario, showSim, setShowSim }) {
  const sims = [
    { id: "feliz", label: "Felicidad", emoji: "😊" },
    { id: "estres", label: "Estrés", emoji: "😨" },
    { id: "hambre", label: "Hambre", emoji: "🥺" },
    { id: "sed", label: "Sed", emoji: "💧" },
    { id: "sueno", label: "Sueño", emoji: "😴" },
    { id: "paseo", label: "Paseo", emoji: "🏃" },
  ];
  return (
    <div style={{ marginTop: 18, background: "white", borderRadius: 20, padding: 16, boxShadow: "0 8px 24px rgba(0,0,0,.08)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showSim ? 12 : 0 }}>
        <div>
          <div style={{ fontSize: 11, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: .5 }}>Panel de demostración</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#1C1C1E" }}>Simular escenario</div>
        </div>
        <button onClick={() => setShowSim(!showSim)} style={{ background: "#F5F5F7", border: "none", borderRadius: 999, padding: "6px 12px", fontSize: 11, fontWeight: 600, color: "#1C1C1E", cursor: "pointer" }}>
          {showSim ? "Ocultar" : "Mostrar"}
        </button>
      </div>
      {showSim && (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 8 }}>
            {sims.map(s => {
              const active = scenario === s.id;
              return (
                <button key={s.id} onClick={() => setScenario(s.id)} style={{ background: active ? "#4CAF50" : "#F5F5F7", color: active ? "white" : "#1C1C1E", border: "none", borderRadius: 12, padding: "10px 6px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all .2s", boxShadow: active ? "0 4px 12px rgba(76,175,80,.3)" : "none" }}>
                  <span style={{ fontSize: 20 }}>{s.emoji}</span>
                  <span style={{ fontSize: 11, fontWeight: 600 }}>{s.label}</span>
                </button>
              );
            })}
          </div>
          <div style={{ marginTop: 10, fontSize: 10, color: "#8E8E93", textAlign: "center", lineHeight: 1.4 }}>
            Cambia el estado en tiempo real para demostrar la respuesta de la app.
          </div>
        </>
      )}
    </div>
  );
}

// ============== RENDER ==============
ReactDOM.createRoot(document.getElementById("root")).render(<PetionalChip />);
</script>
